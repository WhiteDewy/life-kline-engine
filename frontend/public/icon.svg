<!-- public/icon.svg -->
<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FAF7F2"/>
      <stop offset="1" stop-color="#F3EFE7"/>
    </linearGradient>
  </defs>

  <!-- rounded paper tile -->
  <rect x="20" y="20" width="216" height="216" rx="44" fill="url(#paper)" stroke="#E6E0D6" stroke-width="2"/>

  <!-- subtle axis -->
  <path d="M70 176H186" stroke="#D9D1C6" stroke-width="2" stroke-linecap="round"/>
  <path d="M70 176V80" stroke="#D9D1C6" stroke-width="2" stroke-linecap="round"/>

  <!-- kline / structure line -->
  <path d="M78 158 L106 140 L132 152 L158 116 L182 128"
        fill="none" stroke="#2C2A26" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- emphasis nodes -->
  <circle cx="106" cy="140" r="5.5" fill="#2C2A26"/>
  <circle cx="158" cy="116" r="6.5" fill="#C7A46A"/>
</svg>
